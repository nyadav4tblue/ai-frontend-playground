<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/heart.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Create a beautiful romantic invitation" />
    <title>Romantic Invitation</title>
    <!-- Preconnect to Google Fonts for the elegant typeface -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
    <script>
      // Restore path encoded by 404.html for GitHub Pages SPA routing
      (function () {
        var p = new URLSearchParams(window.location.search).get('p');
        if (p) {
          var base = '/AI-FRONTEND-PLAYGROUND';
          history.replaceState(null, '', base + p);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
