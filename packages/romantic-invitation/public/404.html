<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect: encode the full path as ?p=... and bounce to index.html
      var base = '/AI-FRONTEND-PLAYGROUND';
      var path = window.location.pathname.replace(base, '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      var redirectUrl =
        window.location.origin +
        base +
        '/?p=' +
        encodeURIComponent(path + search + hash);
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
